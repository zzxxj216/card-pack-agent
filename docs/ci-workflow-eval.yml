# Copy to .github/workflows/eval.yml after enabling `workflow` scope on your GitHub token,
# or paste in the GitHub UI: Actions → New workflow.
name: eval-regression

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
    paths:
      - "knowledge/**"
      - "src/**"
      - "eval/**"
      - "scripts/**"
      - "tests/**"
      - "pyproject.toml"

jobs:
  lint-and-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install
        run: |
          pip install -e ".[dev]"

      - name: Lint
        run: ruff check src tests eval scripts

      - name: Validate knowledge base
        run: python scripts/validate_knowledge.py

      - name: Smoke tests (mock mode)
        env:
          APP_MODE: mock
        run: pytest tests/ -v -m smoke

  eval-regression:
    runs-on: ubuntu-latest
    needs: lint-and-smoke
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install
        run: pip install -e ".[dev]"

      - name: Run eval A (classification)
        env:
          APP_MODE: dev
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/run_eval.py --suite classify --report eval/runs/ci_classify.json

      - name: Run eval C (generation judge) on small sample
        env:
          APP_MODE: dev
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/run_eval.py --suite generate --limit 5 --report eval/runs/ci_generate.json

      - name: Check regression thresholds
        run: python scripts/check_eval_thresholds.py eval/runs/

      - name: Upload eval reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-reports
          path: eval/runs/
