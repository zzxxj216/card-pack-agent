<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}card-pack-agent eval{% endblock %}</title>
  <style>
    :root {
      --bg: #0f1115;
      --panel: #181b22;
      --panel-2: #1f232c;
      --text: #e6e8eb;
      --muted: #8a8f99;
      --accent: #6cb6ff;
      --accent-2: #a77aff;
      --good: #45d48d;
      --warn: #f2c14e;
      --bad: #ff6b6b;
      --border: #262b36;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
    }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }
    header {
      padding: 14px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    header h1 {
      font-size: 16px;
      margin: 0;
      font-weight: 600;
      letter-spacing: 0.2px;
    }
    header .mode {
      font-size: 12px;
      padding: 3px 8px;
      border-radius: 4px;
      background: var(--panel-2);
      color: var(--muted);
    }
    header .mode.dev { color: var(--warn); }
    header .mode.prod { color: var(--bad); }
    main { padding: 20px 24px; max-width: 1300px; margin: 0 auto; }
    section {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px 18px;
      margin-bottom: 16px;
    }
    h2 { font-size: 14px; color: var(--muted); margin: 0 0 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
    h3 { font-size: 13px; margin: 0 0 8px; color: var(--accent); }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th, td { text-align: left; padding: 8px 10px; border-bottom: 1px solid var(--border); }
    th { color: var(--muted); font-weight: 500; font-size: 12px; text-transform: uppercase; }
    tr:hover td { background: var(--panel-2); }
    .pill {
      display: inline-block;
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 10px;
      background: var(--panel-2);
      color: var(--muted);
    }
    .pill.good { color: var(--good); background: #143824; }
    .pill.warn { color: var(--warn); background: #3a2e15; }
    .pill.bad  { color: var(--bad);  background: #3a1a1a; }
    .form-row { display: flex; gap: 10px; flex-wrap: wrap; align-items: end; }
    .form-row .field { display: flex; flex-direction: column; gap: 4px; }
    .form-row label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.4px; }
    input[type="text"], select, textarea {
      background: var(--panel-2);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 4px;
      padding: 7px 9px;
      font-size: 13px;
      font-family: inherit;
    }
    input[type="text"]:focus, select:focus, textarea:focus { outline: 1px solid var(--accent); }
    button {
      background: var(--accent);
      color: #0f1115;
      border: none;
      border-radius: 4px;
      padding: 8px 14px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
    }
    button:hover { background: #88c5ff; }
    button.secondary { background: var(--panel-2); color: var(--text); border: 1px solid var(--border); }
    button.secondary:hover { background: #272d38; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .small { font-size: 12px; color: var(--muted); }
    pre.code {
      background: #0b0d11;
      border: 1px solid var(--border);
      padding: 10px 12px;
      border-radius: 4px;
      overflow: auto;
      font-size: 12px;
      max-height: 320px;
    }
    .scorebar { display: flex; gap: 6px; align-items: center; }
    .scorebar .bar {
      flex: 1;
      height: 6px;
      background: var(--panel-2);
      border-radius: 3px;
      overflow: hidden;
      max-width: 160px;
    }
    .scorebar .bar > div { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent-2)); }
    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 14px;
    }
    .card {
      background: var(--panel-2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 12px;
      font-size: 12px;
    }
    .card .pos { font-size: 11px; color: var(--muted); }
    .card .hook { font-weight: 600; margin: 4px 0 6px; color: var(--text); }
    .card .visual { color: var(--muted); font-size: 11px; font-style: italic; max-height: 80px; overflow: hidden; }
    .card img { width: 100%; border-radius: 4px; margin-top: 8px; }
    .card .providers { margin-top: 8px; display: flex; gap: 4px; flex-wrap: wrap; }
    .card .providers button { padding: 3px 6px; font-size: 10px; background: var(--panel); color: var(--muted); border: 1px solid var(--border); }
    .card .providers button:hover { color: var(--text); border-color: var(--accent); }
    .flash { padding: 10px 14px; background: #143824; border: 1px solid var(--good); border-radius: 6px; color: var(--good); margin-bottom: 10px; font-size: 13px; }
    .flash.error { background: #3a1a1a; border-color: var(--bad); color: var(--bad); }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    @media (max-width: 900px) { .row { grid-template-columns: 1fr; } }
    .kv { display: grid; grid-template-columns: 180px 1fr; gap: 4px 10px; font-size: 12px; }
    .kv dt { color: var(--muted); }
    .kv dd { margin: 0; word-break: break-word; }
    .palette { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
    .palette .swatch { width: 14px; height: 14px; border-radius: 3px; border: 1px solid var(--border); display: inline-block; }
    .palette code { font-size: 11px; color: var(--muted); }
    .issue-row { display: grid; grid-template-columns: 70px 180px 1fr; gap: 8px; align-items: start; padding: 4px 0; border-bottom: 1px solid var(--border); }
    .issue-row:last-child { border-bottom: 0; }
  </style>
</head>
<body>
  <header>
    <h1>
      <a href="/">card-pack-agent</a>
      <span class="small" style="color: var(--muted)"> / eval</span>
    </h1>
    <span class="mode {{ app_mode }}">APP_MODE={{ app_mode }}</span>
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
</body>
</html>
